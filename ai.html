<input id="prompt" placeholder="Nachricht schreiben..." onkeydown="if(event.key==='Enter')sendPrompt()">

<button class="send-btn" onclick="sendPrompt()">Senden</button>

</div>

</div>

<script>

const OWNER="Lobi";
const COOWNER="Jovi";

const API_URL="https://unexempt-predenial-aryanna.ngrok-free.dev";

let users=JSON.parse(localStorage.getItem("nano_users"))||{};

let currentUser=localStorage.getItem("nano_currentUser");

let currentChat=null;

const plans={
free:{name:"Free",limit:50},
ultra:{name:"Ultra",limit:500},
nano:{name:"Nano",limit:9999}
};

function saveUsers(){

localStorage.setItem("nano_users",JSON.stringify(users));

}

function register(){

let u=username.value.trim();

let p=password.value.trim();

if(!u||!p)return;

if(users[u])return;

users[u]={

password:p,

plan:"free",

banned:false,

chats:{},

messages:0

};

saveUsers();

alert("Registriert");

}

function login(){

let u=username.value.trim();

let p=password.value.trim();

if(!users[u])return;

if(users[u].password!==p)return;

if(users[u].banned)return alert("Gebannt");

currentUser=u;

localStorage.setItem("nano_currentUser",u);

startApp();

}

function logout(){

localStorage.removeItem("nano_currentUser");

location.reload();

}

function startApp(){

loginScreen.style.display="none";

profileName.innerText=currentUser;

updatePlan();

renderChats();

}

function updatePlan(){

let p=users[currentUser].plan;

planBadge.innerText=plans[p].name;

}

function createChat(){

let id=Date.now();

users[currentUser].chats[id]={

name:"Neuer Chat",

messages:[]

};

currentChat=id;

saveUsers();

renderChats();

renderMessages();

}

function selectChat(id){

currentChat=id;

renderChats();

renderMessages();

}

function renderChats(){

let list=document.getElementById("chatList");

list.innerHTML="";

let chats=users[currentUser].chats;

for(let id in chats){

let div=document.createElement("div");

div.className="chat-item";

if(id==currentChat)div.classList.add("active");

div.innerText=chats[id].name;

div.onclick=()=>selectChat(id);

list.appendChild(div);

}

}

function renderMessages(){

let chatDiv=document.getElementById("chat");

chatDiv.innerHTML="";

if(!currentChat)return;

let msgs=users[currentUser].chats[currentChat].messages;

msgs.forEach(m=>{

let d=document.createElement("div");

d.className="message "+m.role;

d.innerText=m.text;

chatDiv.appendChild(d);

});

}

function sendPrompt(){

let input=document.getElementById("prompt");

let text=input.value.trim();

if(!text)return;

if(!currentChat)return;

let plan=users[currentUser].plan;

if(users[currentUser].messages>=plans[plan].limit){

alert("Limit erreicht");

return;

}

users[currentUser].messages++;

users[currentUser].chats[currentChat].messages.push({role:"user",text});

renderMessages();

input.value="";

let bot=document.createElement("div");

bot.className="message ai";

bot.innerText="...";

document.getElementById("chat").appendChild(bot);

fetch(API_URL,{

method:"POST",

headers:{"Content-Type":"application/json"},

body:JSON.stringify({prompt:text})

})

.then(r=>r.json())

.then(d=>{

bot.innerText=d.text;

users[currentUser].chats[currentChat].messages.push({role:"ai",text:d.text});

saveUsers();

})

.catch(()=>{

bot.innerText="Server Fehler";

});

}

if(currentUser){

startApp();

}

</script>

<script>

    if(!currentUser) return;

    users[currentUser].chats[chatId].messages[msgIndex].text = newText;

    users[currentUser].chats[chatId].messages.splice(msgIndex,1);

<!-- =========================
AUTOMATIC SCROLL & TYPING EFFECT
========================= -->

<script>
function typeText(container, text, callback){
    container.innerText = "";
    let i = 0;
    let interval = setInterval(()=>{
        container.innerText += text.charAt(i);
        i++;
        container.scrollIntoView({behavior:"smooth"});
        if(i >= text.length){
            clearInterval(interval);
            if(callback) callback();
        }
    }, 20);
}

function sendPromptWithTyping(){
    let input = document.getElementById("prompt");
    let text = input.value.trim();
    if(!text || !currentChat) return;

    users[currentUser].chats[currentChat].messages.push({role:"user", text});
    renderMessages();
    input.value = "";

    let chatDiv = document.getElementById("chat");
    let botDiv = document.createElement("div");
    botDiv.className = "message ai";
    let dots = document.createElement("span");
    dots.className = "dots";
    for(let d=0; d<3; d++){
        let dot = document.createElement("span");
        dot.className="dot";
        dots.appendChild(dot);
    }
    botDiv.appendChild(dots);
    chatDiv.appendChild(botDiv);
    chatDiv.scrollTop = chatDiv.scrollHeight;

    fetch(API_URL, {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({prompt:text, language:currentLanguage})
    })
    .then(res=>res.json())
    .then(data=>{
        botDiv.removeChild(dots);
        typeText(botDiv, data.text, ()=>{
            users[currentUser].chats[currentChat].messages.push({role:"ai", text:data.text});
            saveUsers();
        });
    })
    .catch(()=>{botDiv.innerText="Server Fehler";});
}
</script>

<script>
function notifyUser(title, message){
    if(Notification.permission === "granted"){
        new Notification(title, {body: message});
    }else if(Notification.permission !== "denied"){
        Notification.requestPermission().then(permission=>{
            if(permission === "granted") new Notification(title,{body: message});
        });
    }
}

function notifyNewMessage(msg){
    if(msg.role === "ai") return;
    notifyUser("Neue Nachricht", msg.text);
}
</script>
